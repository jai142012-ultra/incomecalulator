<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas, size) {
  const ctx = canvas.getContext('2d');
  // Background gradient
  const grad = ctx.createLinearGradient(0, 0, size, size);
  grad.addColorStop(0, '#6366f1');
  grad.addColorStop(1, '#4f46e5');
  
  // Rounded rect background
  const r = size * 0.18;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();
  
  // Draw "V" letter
  ctx.fillStyle = '#ffffff';
  ctx.font = `bold ${size * 0.5}px Outfit, Arial, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('V', size/2, size/2 - size*0.02);
  
  // Small chart bars at bottom
  const barW = size * 0.06;
  const barGap = size * 0.04;
  const barStartX = size * 0.3;
  const barBaseY = size * 0.78;
  const barHeights = [size*0.08, size*0.14, size*0.10, size*0.16, size*0.12];
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  barHeights.forEach((h, i) => {
    ctx.fillRect(barStartX + i * (barW + barGap), barBaseY - h, barW, h);
  });
}

drawIcon(document.getElementById('c192'), 192);
drawIcon(document.getElementById('c512'), 512);

// Download links
function download(canvasId, filename) {
  const link = document.createElement('a');
  link.download = filename;
  link.href = document.getElementById(canvasId).toDataURL('image/png');
  link.click();
}

document.body.innerHTML += '<br><button onclick="download(\'c192\',\'icon-192.png\')">Download 192</button>';
document.body.innerHTML += '<button onclick="download(\'c512\',\'icon-512.png\')">Download 512</button>';
</script>
</body>
</html>
